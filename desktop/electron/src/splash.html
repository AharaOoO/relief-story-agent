<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading Relief Story Agent...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 50% 38%, #ffffff 0%, #edf4fa 68%, #e8f0f7 100%);
      color: #252832;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .spinner-container {
      position: relative;
      width: 60px;
      height: 60px;
      margin-bottom: 24px;
    }
    .spinner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 3px solid rgba(66, 111, 202, 0.12);
      border-top-color: #6e9fff;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(110,159,255,0.16) 0%, rgba(110,159,255,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .text {
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.7;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="spinner-container">
    <div class="glow"></div>
    <div class="spinner"></div>
  </div>
  <div class="text">Engine Starting...</div>
</body>
</html>
